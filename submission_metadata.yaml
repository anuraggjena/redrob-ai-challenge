# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Cursor"

ai_usage_summary: |
  Used Claude and Cursor for architecture design, code review, refactoring, and
  documentation. AI tools were not used to process candidate data or to generate
  ranking scores or reasoning at inference time. All ranking logic, feature
  engineering, honeypot detection, and explainability run in deterministic Python
  code with no LLM or network calls during ranking.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Eight-stage Candidate Intelligence & Ranking Engine for 100K profiles. Parses
  candidates into CandidateProfile objects and extracts 150 engineered features
  (career-evidence ratios, recruiter-intelligence composites, trust signals).
  Hybrid retrieval fuses BGE-small-en-v1.5 dense search (FAISS HNSW) with BM25
  via reciprocal rank fusion into a ~5K recall pool. A seven-component weighted
  ensemble with hard gates and seven honeypot detectors (noisy-OR fusion)
  coarse-scores candidates; LightGBM LambdaMART re-ranks the top ~2K to 100.
  Reasoning is generated from evidence-graph templates with hallucination guards
  — no LLM at runtime. Offline pre-compute builds embeddings, indexes, features,
  synthetic labels, and the LTR model (~215 min from scratch). Runtime ranking:
  81 sec on CPU, 16 GB RAM, no network.

